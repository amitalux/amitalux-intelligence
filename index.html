<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amitalux Intelligence for Customer Care</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="role-shell">
      <aside class="role-sidebar">
        <div class="product-brand">
          <div class="brand-orb"></div>
          <div>
            <strong>Amitalux</strong>
            <span>Intelligence</span>
          </div>
        </div>
        <button class="role-button active" data-role="Admin Console">Admin Console</button>
        <button class="role-button" data-role="Agent Console">Agent Console</button>
        <button class="role-button" data-role="Supervisor Console">Supervisor Console</button>
        <div class="profile-card">
          <div class="avatar">JS</div>
          <div>
            <strong>John Smith</strong>
            <span id="profileRole">Admin</span>
          </div>
        </div>
      </aside>

      <section class="crm-frame">
        <aside class="crm-sidebar">
          <div class="crm-logo">
            <div class="hex"></div>
            <strong>Support CRM</strong>
          </div>
          <nav id="crmNav"></nav>
        </aside>

        <main class="workspace">
          <div id="workspace"></div>
        </main>
      </section>
    </div>

    <script src="app.js"></script>
  </body>
</html>
